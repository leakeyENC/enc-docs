          '<div style="padding:12px 15px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;font-weight:600;color:' + r.statusColor + ';">' + esc(r.status) + '</div>' +
          '<div style="padding:12px 15px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:#0A1A4F;font-weight:500;word-break:break-word;">' + esc(r.code) + '</div>' +
          '<div style="padding:12px 15px;color:#46506E;line-height:1.55;">' + esc(r.desc) + '</div>' +
        '</div>';
      }).join('');
      return '<div id="' + attr(grp.id) + '" style="margin-bottom:34px;scroll-margin-top:84px;">' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
          '<h2 style="font-family:\'Oswald\',sans-serif;font-weight:600;font-size:23px;color:#0A1A4F;margin:0;">' + esc(grp.title) + '</h2>' +
          '<span style="font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;background:' + grp.badgeBg + ';color:' + grp.badgeFg + ';">' + esc(grp.range) + '</span>' +
        '</div>' +
        '<div style="border:1px solid #E2E7F1;border-radius:12px;overflow:hidden;">' +
          '<div style="display:grid;grid-template-columns:0.55fr 1.4fr 2.3fr;background:#0A1A4F;color:#FFFFFF;font-size:12px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;"><div style="padding:11px 15px;">HTTP</div><div style="padding:11px 15px;">Code</div><div style="padding:11px 15px;">Description</div></div>' + rows +
        '</div>' +
      '</div>';
    }).join('');

    var catLinks = ERROR_GROUPS.map(function (grp) {
      return '<a href="#' + attr(grp.id) + '" style="padding:7px 0 7px 14px;margin-left:-1px;border-left:2px solid transparent;color:var(--c-text-muted);font-size:13.5px;text-decoration:none;"' + hov('color:var(--c-text);border-left-color:var(--c-accent-bar);') + '>' + esc(grp.title) + '</a>';
    }).join('');

    var codePill = 'font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13.5px;background:#EEF1F8;padding:2px 6px;border-radius:5px;color:#2B5BD7;';
    var errShape = '{\n  "error": {\n    "code": "INVALID_PAYLOAD",\n    "message": "clientRepresentivePassword must be 16–36 characters",\n    "status": 400\n  }\n}';

    var main = '<div style="background:#F6F8FC;min-height:calc(100vh - 64px);">' +
      '<div style="max-width:820px;margin:0 auto;padding:44px 48px 90px;color:#26304F;">' +
        '<div style="font-size:13px;color:#6B7796;margin-bottom:14px;font-weight:500;">Guides <span style="color:#B6C0D8;">/</span> Reference</div>' +
        '<h1 style="font-family:\'Oswald\',sans-serif;font-weight:700;font-size:42px;line-height:1.08;color:#0A1A4F;margin:0 0 14px;">Error Codes Reference</h1>' +
        '<p style="font-size:17px;line-height:1.7;color:#46506E;margin:0 0 26px;">Every Encryptus API error returns a JSON body with a machine-readable <code style="' + codePill + '">code</code>, a human <code style="' + codePill + '">message</code>, and the originating HTTP status. Use the <code style="' + codePill + '">code</code> for programmatic handling — messages may change.</p>' +
        '<div style="background:#0B1020;border:1px solid #E2E7F1;border-radius:12px;padding:18px 20px;margin-bottom:38px;">' +
          '<div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#7A88B0;margin-bottom:8px;font-weight:600;">Error shape</div>' +
          '<pre style="margin:0;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.65;color:#C7D0EC;white-space:pre;">' + esc(errShape) + '</pre>' +
        '</div>' + errBlocks +
      '</div>' +
    '</div>';

    var toc = '<aside class="ed-toc" style="position:sticky;top:64px;height:calc(100vh - 64px);padding:44px 20px;">' +
      '<div style="font-family:\'Oswald\',sans-serif;font-weight:600;font-size:12px;letter-spacing:.16em;color:var(--c-text-faint);margin-bottom:14px;">CATEGORIES</div>' +
      '<div style="display:flex;flex-direction:column;gap:2px;border-left:1px solid var(--c-border);">' + catLinks + '</div>' +
    '</aside>';

    return '<div style="display:grid;grid-template-columns:280px minmax(0,1fr) 240px;max-width:1480px;margin:0 auto;align-items:start;" class="ed-guide-grid">' +
      guideSidebar() + main + toc +
    '</div>';
  }

  function footer() {
    var socialsHtml = SOCIALS.map(function (s) {
      return '<a href="#" style="width:36px;height:36px;border-radius:50%;border:1px solid var(--c-border-card);display:flex;align-items:center;justify-content:center;color:var(--c-footer-link);text-decoration:none;"' + hov('border-color:var(--c-accent);background:var(--c-accent-soft);') + '><span style="font-family:\'Oswald\',sans-serif;font-weight:600;font-size:14px;">' + esc(s) + '</span></a>';
    }).join('');
    var colsHtml = FOOTER_COLS.map(function (col) {
      var links = col.links.map(function (lk) {
        return '<a href="#" style="font-size:14px;color:var(--c-footer-link);text-decoration:none;opacity:.85;"' + hov('opacity:1;text-decoration:underline;') + '>' + esc(lk) + '</a>';
      }).join('');
      return '<div><div style="font-family:\'Oswald\',sans-serif;font-weight:600;font-size:14px;letter-spacing:.1em;text-transform:uppercase;color:var(--c-heading);margin-bottom:16px;">' + esc(col.title) + '</div><div style="display:flex;flex-direction:column;gap:11px;">' + links + '</div></div>';
    }).join('');

    return '<footer style="background:var(--c-bg-deep);border-top:1px solid var(--c-header-border);margin-top:64px;">' +
      '<div style="max-width:1180px;margin:0 auto;padding:52px 28px 30px;">' +
        '<div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:36px;" class="ed-footer-grid">' +
          '<div>' +
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;"><svg width="28" height="28" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#0A1A4F" stroke="#E8B419" stroke-width="7"></circle><text x="51" y="53" text-anchor="middle" dominant-baseline="central" font-family="Oswald" font-weight="700" font-size="64" fill="#E8B419">e</text></svg><span style="font-family:\'Oswald\',sans-serif;font-weight:700;font-size:20px;letter-spacing:.14em;color:var(--c-heading);">ENCRYPTUS</span></div>' +
            '<p style="font-size:13.5px;line-height:1.6;color:var(--c-text-faint);max-width:300px;margin:0 0 18px;">Regulated crypto-to-fiat infrastructure for institutions. Licensed in the DMCC free zone, Dubai, UAE.</p>' +
            '<div style="display:flex;gap:10px;">' + socialsHtml + '</div>' +
          '</div>' + colsHtml +
        '</div>' +
        '<div style="margin-top:40px;padding-top:22px;border-top:1px solid var(--c-divider);display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--c-text-faint);">' +
          '<span>© 2026 Encryptus FZE. All rights reserved.</span>' +
          '<span>Built for institutions · Status: <span style="color:var(--c-success);">● All systems operational</span></span>' +
        '</div>' +
      '</div>' +
    '</footer>';
  }

  function searchOverlay() {
    if (!state.searchOpen) return '';
    var results = buildSearch();
    var noResults = state.query.trim() !== '' && results.length === 0;
    var resultsHtml = results.map(function (r) {
      return '<div data-action="goArg" data-go="' + attr(JSON.stringify(r.go)) + '" style="display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:10px;cursor:pointer;"' + hov('background:var(--c-hover);') + '>' +
        '<span style="flex:none;width:54px;text-align:center;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10.5px;font-weight:600;padding:3px 0;border-radius:5px;background:' + r.tagBg + ';color:' + r.tagFg + ';">' + esc(r.kind) + '</span>' +
        '<div style="flex:1;min-width:0;"><div style="font-size:14.5px;color:var(--c-text);font-weight:500;">' + esc(r.label) + '</div><div style="font-size:12.5px;color:var(--c-text-faint);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(r.sub) + '</div></div>' +
        '<span style="color:var(--c-text-faint);font-size:14px;">↵</span>' +
      '</div>';
    }).join('');
    if (noResults) resultsHtml = '<div style="padding:36px;text-align:center;color:var(--c-text-faint);font-size:14.5px;">No results for “' + esc(state.query) + '”.</div>';

    return '<div data-action="closeSearch" style="position:fixed;inset:0;z-index:60;background:rgba(4,10,33,.5);backdrop-filter:blur(4px);display:flex;justify-content:center;padding-top:12vh;">' +
      '<div data-action="stop" style="width:600px;max-width:92vw;height:max-content;max-height:70vh;background:var(--c-surface);border:1px solid var(--c-modal-border);border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.3);animation:ed-fade .14s ease;">' +
        '<div style="display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--c-border);">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-accent)" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg>' +
          '<input id="ed-search-input" autofocus placeholder="Search guides and endpoints…" value="' + attr(state.query) + '" style="flex:1;background:none;border:none;outline:none;color:var(--c-text);font-size:17px;font-family:inherit;">' +
          '<span data-action="closeSearch" style="cursor:pointer;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:var(--c-text-muted);border:1px solid var(--c-kbd-border);border-radius:5px;padding:2px 7px;">ESC</span>' +
        '</div>' +
        '<div class="ed-scroll" id="ed-search-results" style="max-height:52vh;overflow-y:auto;padding:8px;">' + resultsHtml + '</div>' +
      '</div>' +
    '</div>';
  }

  function mobileDrawer() {
    if (!state.mobileNav) return '';
    var v = state.view;
    var themeRow = state.theme === 'light'
      ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path></svg> Dark'
      : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.2"></circle><path d="M12 2v2.4M12 19.6V22M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2 12h2.4M19.6 12H22M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7"></path></svg> Light';
    return '<div data-action="closeMobile" style="position:fixed;inset:0;z-index:55;background:rgba(4,10,33,.5);backdrop-filter:blur(3px);">' +
      '<div data-action="stop" class="ed-scroll" style="position:absolute;top:0;right:0;height:100%;width:300px;max-width:85vw;background:var(--c-surface);border-left:1px solid var(--c-modal-border);overflow-y:auto;padding:18px;animation:ed-fade .15s ease;">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
          '<span data-action="toggleTheme" title="Toggle theme" style="cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--c-nav-text);border:1px solid var(--c-field-border);border-radius:20px;padding:6px 12px;">' + themeRow + '</span>' +
          '<span data-action="closeMobile" style="cursor:pointer;color:var(--c-accent);font-size:26px;line-height:1;">×</span>' +
        '</div>' +
        '<div data-action="openSearch" style="display:flex;align-items:center;gap:10px;height:42px;padding:0 14px;background:var(--c-field-bg);border:1px solid var(--c-field-border);border-radius:22px;color:var(--c-field-text);font-size:14px;margin-bottom:18px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.3-4.3"></path></svg> Search docs…</div>' +
        '<div data-action="go" data-view="guide" data-guide="overview" style="' + mNavPill(v === 'guide') + '">Guides</div>' +
        '<div data-action="go" data-view="api" style="' + mNavPill(v === 'api') + '">API Reference</div>' +
        '<div data-action="go" data-view="errors" style="' + mNavPill(v === 'errors') + '">Error Codes</div>' +
        '<a href="#" data-action="go" data-view="api" style="display:flex;align-items:center;justify-content:center;height:46px;margin-top:18px;background:var(--c-cta-bg);color:var(--c-cta-text);font-weight:600;font-size:15px;border-radius:24px;text-decoration:none;">Get API Key</a>' +
      '</div>' +
    '</div>';
  }

  /* ---------- Hover / focus style application ---------- */
  function applyDynamicStyles(root) {
    root.querySelectorAll('[data-hover]').forEach(function (el) {
      var hover = el.getAttribute('data-hover');
      el.addEventListener('mouseenter', function () {
        el.setAttribute('data-prevstyle', el.getAttribute('style') || '');
        el.setAttribute('style', (el.getAttribute('style') || '') + hover);
      });
      el.addEventListener('mouseleave', function () {
        if (el.hasAttribute('data-prevstyle')) el.setAttribute('style', el.getAttribute('data-prevstyle'));
      });
    });
    root.querySelectorAll('[data-focus]').forEach(function (el) {
      var focus = el.getAttribute('data-focus');
      el.addEventListener('focus', function () {
        el.setAttribute('data-prevstyle', el.getAttribute('style') || '');
        el.setAttribute('style', (el.getAttribute('style') || '') + focus);
      });
      el.addEventListener('blur', function () {
        if (el.hasAttribute('data-prevstyle')) el.setAttribute('style', el.getAttribute('data-prevstyle'));
      });
    });
  }

  /* ---------- Render ---------- */
  function render() {
    var app = document.getElementById('app');
    app.setAttribute('data-theme', state.theme);
    var main;
    if (state.view === 'guide') main = viewGuide();
    else if (state.view === 'api') main = viewApi();
    else if (state.view === 'errors') main = viewErrors();
    else main = viewHome();

    app.innerHTML = header() + '<main>' + main + '</main>' + footer() + searchOverlay() + mobileDrawer();
    applyDynamicStyles(app);

    var searchInput = document.getElementById('ed-search-input');
    if (searchInput) {
      searchInput.focus();
      var val = searchInput.value; searchInput.value = ''; searchInput.value = val;
      searchInput.addEventListener('input', onSearchInput);
    }
    var pg = document.getElementById('ed-pg');
    if (pg) pg.addEventListener('input', onPgInput);
  }

  /* ---------- Event wiring ---------- */
  function onSearchInput(e) {
    state.query = e.target.value;
    // Re-render only the results list to keep input focus & caret intact.
    var box = document.getElementById('ed-search-results');
    if (!box) return;
    var results = buildSearch();
    var noResults = state.query.trim() !== '' && results.length === 0;
    if (noResults) {
      box.innerHTML = '<div style="padding:36px;text-align:center;color:var(--c-text-faint);font-size:14.5px;">No results for “' + esc(state.query) + '”.</div>';
    } else {
      box.innerHTML = results.map(function (r) {
        return '<div data-action="goArg" data-go="' + attr(JSON.stringify(r.go)) + '" style="display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:10px;cursor:pointer;"' + hov('background:var(--c-hover);') + '>' +
          '<span style="flex:none;width:54px;text-align:center;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10.5px;font-weight:600;padding:3px 0;border-radius:5px;background:' + r.tagBg + ';color:' + r.tagFg + ';">' + esc(r.kind) + '</span>' +
          '<div style="flex:1;min-width:0;"><div style="font-size:14.5px;color:var(--c-text);font-weight:500;">' + esc(r.label) + '</div><div style="font-size:12.5px;color:var(--c-text-faint);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(r.sub) + '</div></div>' +
          '<span style="color:var(--c-text-faint);font-size:14px;">↵</span>' +
        '</div>';
      }).join('');
    }
    applyDynamicStyles(box);
  }

  function onPgInput(e) {
    if (state.pgTab === 'curl') state.curlText = e.target.value;
    else state.tsText = e.target.value;
    pgActiveText = e.target.value;
    // No re-render: keep textarea editing smooth.
  }

  function pgRun() {
    if (state.pgLoading) return;
    setState({ pgLoading: true, pgDone: false });
    clearTimeout(pgTimer);
    pgTimer = setTimeout(function () { setState({ pgLoading: false, pgDone: true }); }, 1150);
  }
  function copyPg() {
    try { if (navigator.clipboard) navigator.clipboard.writeText(pgActiveText || ''); } catch (e) {}
    setState({ copied: true });
    clearTimeout(copyTimer);
    copyTimer = setTimeout(function () { setState({ copied: false }); }, 1600);
  }

  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest('[data-action]');
    if (!el) return;
    var action = el.getAttribute('data-action');
    switch (action) {
      case 'stop': e.stopPropagation(); return;
      case 'go': {
        e.preventDefault();
        var view = el.getAttribute('data-view');
        var extra = {};
        if (el.getAttribute('data-guide')) extra.activeGuide = el.getAttribute('data-guide');
        if (el.getAttribute('data-endpoint')) extra.activeEndpoint = el.getAttribute('data-endpoint');
        go(view, extra);
        return;
      }
      case 'goArg': {
        e.preventDefault();
        var spec = JSON.parse(el.getAttribute('data-go'));
        go(spec[0], spec[1] || {});
        return;
      }
      case 'toggleTheme': setState({ theme: state.theme === 'light' ? 'dark' : 'light' }); persistTheme(); return;
      case 'openSearch': setState({ searchOpen: true, mobileNav: false }); return;
      case 'closeSearch': setState({ searchOpen: false, query: '' }); return;
      case 'toggleMobile': setState({ mobileNav: !state.mobileNav }); return;
      case 'closeMobile': setState({ mobileNav: false }); return;
      case 'toggleGuide': {
        var gid = el.getAttribute('data-id');
        var og = {}; for (var k in state.openGuide) og[k] = state.openGuide[k];
        og[gid] = !og[gid];
        setState({ openGuide: og });
        return;
      }
      case 'toggleApi': {
        var aid = el.getAttribute('data-id');
        var oa = {}; for (var k2 in state.openApi) oa[k2] = state.openApi[k2];
        oa[aid] = !oa[aid];
        setState({ openApi: oa });
        return;
      }
      case 'setCurlTab': setState({ pgTab: 'curl' }); return;
      case 'setTsTab': setState({ pgTab: 'ts' }); return;
      case 'copyPg': copyPg(); return;
      case 'pgRun': pgRun(); return;
    }
  });

  function persistTheme() {
    try { localStorage.setItem('ed-theme', state.theme); } catch (e) {}
  }

  /* Keyboard: Cmd/Ctrl+K to open search, ESC to close overlays */
  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      setState({ searchOpen: true, mobileNav: false });
    } else if (e.key === 'Escape') {
      if (state.searchOpen) setState({ searchOpen: false, query: '' });
      else if (state.mobileNav) setState({ mobileNav: false });
    }
  });

  render();
})();
</script>
</body>
</html>
